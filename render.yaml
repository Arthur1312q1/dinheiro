services:
  - type: web
    name: okx-eth-trading-bot
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 --access-logfile -
    healthCheckPath: /health
    healthCheckInterval: 60s
    healthCheckTimeout: 10s
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: RENDER
        value: "true"
        sync: false
      - key: RENDER_SERVICE_NAME
        value: "okx-eth-trading-bot"
        sync: false
      - key: OKX_API_KEY
        value: ""  # Sua API Key da OKX
        sync: false
      - key: OKX_SECRET_KEY
        value: ""  # Seu Secret Key da OKX
        sync: false
      - key: OKX_PASSPHRASE
        value: ""  # Seu Passphrase da OKX
        sync: false
    disk:
      name: trade-history-data
      mountPath: /data
      sizeGB: 1
